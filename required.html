<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta | Privacy Center</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5D87FF',
                        dark: '#344854'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white">

    <div class="max-w-[1100px] mx-auto grid grid-cols-12 min-h-screen">

        <!-- SIDEBAR -->
        <div class="col-span-12 md:col-span-4 border-r border-[#DEE3E9] p-4">

            <img src="/public/icons/ic_meta.svg" class="w-[70px] mb-4" />

            <h1 class="font-bold text-[26px] mb-4">Privacy Center</h1>

            <div id="menu" class="flex flex-col gap-1 text-[15px]">

                <!-- ITEM -->
                <div class="menu-item">
                    <img src="/public/icons/ic_home.svg" />
                    <span>Privacy Centre home</span>
                </div>

                <div class="menu-item">
                    <img src="/public/icons/ic_search.svg" />
                    <span>Search</span>
                </div>

                <div class="menu-item active">
                    <img src="/public/icons/ic_setting.svg" />
                    <span>Common privacy settings</span>
                </div>

                <div class="menu-item">
                    <img src="/public/icons/ic_topics.svg" />
                    <span>Privacy topics</span>
                </div>

                <div class="menu-item">
                    <img src="/public/icons/ic_resource.svg" />
                    <span>More privacy resources</span>
                </div>

                <div class="menu-item has-arrow">
                    <div class="flex items-center gap-3">
                        <img src="/public/icons/ic_locked.svg" />
                        <span>Privacy Policy</span>
                    </div>
                    <img src="/public/icons/ic_arrow.svg" class="arrow" />
                </div>

                <div class="menu-item has-arrow">
                    <div class="flex items-center gap-3">
                        <img src="/public/icons/ic_other.svg" />
                        <span>Other policies and articles</span>
                    </div>
                    <img src="/public/icons/ic_arrow.svg" class="arrow" />
                </div>

            </div>
        </div>

        <!-- CONTENT -->
        <div class="col-span-12 md:col-span-8 p-6">

            <h1 class="text-[22px] font-bold mb-3">
                Meta Agency Partner Program
            </h1>

            <p class="text-[14px] text-[#344854] mb-2">
                Your agency has been selected as a qualified candidate to participate in the Meta Agency Partner Program.
            </p>

            <button class="bg-[#1877f2] text-white px-4 py-2 rounded-full mt-3">
                Join Meta Agency Program
            </button>

        </div>

    </div>

    <!-- STYLE -->
    <style>
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item img {
            width: 24px;
            height: 24px;
        }

        .menu-item > span {
            margin-left: 12px;
        }

        .menu-item:hover {
            background: #E3E8EF;
        }

        .menu-item.active {
            background: #344854;
            color: white;
        }

        .menu-item.active img {
            filter: brightness(0) invert(1);
        }

        .has-arrow {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .arrow {
            width: 16px !important;
        }
    </style>

    <!-- SCRIPT -->
    <script>
        const items = document.querySelectorAll('.menu-item');

        items.forEach(item => {
            item.addEventListener('click', () => {
                items.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>
</html>
