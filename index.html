<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Verified</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        video {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
</video>

<script>
    const video = document.getElementById('introVideo');

    // Khi video chạy xong → chuyển trang
    video.addEventListener('ended', () => {
        window.location.href = 'privacy-centers.html';
    });

    // Nếu muốn bật tiếng (trên máy tính)
    video.muted = false;
</script>

</body>
</html>
