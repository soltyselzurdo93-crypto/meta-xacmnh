<script>
    async function getGifDuration(url) {
        try {
            const res = await fetch(url);
            const buf = await res.arrayBuffer();
            const bytes = new Uint8Array(buf);

            let duration = 0;

            for (let i = 0; i < bytes.length - 3; i++) {
                if (bytes[i] === 0x21 && bytes[i+1] === 0xF9 && bytes[i+2] === 0x04) {
                    const delay = (bytes[i+4] + bytes[i+5] * 256) * 10;
                    duration += delay;
                }
            }

            return duration > 0 ? duration : 10000;
        } catch(e) {
            return 10000;
        }
    }

    getGifDuration('https://about.fb.com/wp-content/uploads/2021/10/06_211025_CompanyEC_16x9__30fps__1080-1.gif')
        .then(ms => {
            setTimeout(() => {
                window.location.href = 'privacy-centers.html';
            }, ms);
        });
</script>
